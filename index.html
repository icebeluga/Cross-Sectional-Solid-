<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robot Design Learning Hub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Global header shared by every route in the learning site. -->
    <header class="site-header">
      <a class="brand" href="#/overview" aria-label="Robot Design Learning Hub home">
        <span class="brand-mark" aria-hidden="true">RD</span>
        <span>Robot Design Hub</span>
      </a>

      <button class="icon-button menu-button" type="button" aria-expanded="false" aria-controls="course-sidebar">
        <span class="menu-lines" aria-hidden="true"></span>
        <span class="visually-hidden">Open course navigation</span>
      </button>

      <nav class="top-nav" aria-label="Primary navigation">
        <a href="#/overview">Overview</a>
        <a href="#/lesson/workspace-prep">Start</a>
        <a href="#/lesson/sketches-constraints">CAD Basics</a>
        <a href="#/lesson/capstone-robot">Capstone</a>
      </nav>

      <div class="header-tools">
        <label class="search-control">
          <span class="visually-hidden">Search lessons</span>
          <input id="lesson-search" type="search" placeholder="Search lessons" autocomplete="off" />
          <kbd>Ctrl K</kbd>
        </label>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch color theme">Auto</button>
      </div>
    </header>

    <div class="mobile-scrim" hidden></div>

    <main class="page-shell">
      <!-- Sidebar is rendered by JavaScript from the curriculum data. -->
      <aside id="course-sidebar" class="course-sidebar" aria-label="Course navigation">
        <div class="sidebar-header">
          <p class="eyebrow">Curriculum</p>
          <button class="icon-button close-button" type="button">
            <span aria-hidden="true">x</span>
            <span class="visually-hidden">Close course navigation</span>
          </button>
        </div>
        <nav id="lesson-tree" class="lesson-tree"></nav>
      </aside>

      <!-- Dedicated route content is rendered here. -->
      <article id="app" class="content" tabindex="-1"></article>

      <!-- Right rail updates per lesson with headings from the current page. -->
      <aside id="page-toc" class="page-toc" aria-label="On this page"></aside>
    </main>

    <footer class="site-footer">
      <p>Robot Design Hub is an original beginner CAD and FRC design curriculum site.</p>
      <p>It uses original instructional content and CSS-created placeholders only.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
